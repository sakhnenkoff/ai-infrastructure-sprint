<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Infrastructure Sprint</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── RESET ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── DESIGN TOKENS ── */
  :root {
    --black: #000;
    --white: #fff;
    --off-white: #f5f5f0;
    --grey: #999;
    --grey-light: #ddd;
    --grey-dark: #333;
    --green: #4ade80;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --border-thick: 3px solid var(--black);
    --border-thin: 2px solid var(--black);
  }

  /* ── BASE ── */
  html, body { height: 100%; }
  body {
    font-family: var(--font-display);
    background: var(--white);
    color: var(--black);
    line-height: 1.6;
  }

  /* ── SCREEN SYSTEM ── */
  .screen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
  }
  .screen.active { display: flex; }

  /* ── TAG (black box label) ── */
  .tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--black);
    color: var(--white);
    padding: 6px 12px;
  }

  /* ── TYPOGRAPHY ── */
  .headline-xl {
    font-family: var(--font-display);
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -2px;
  }

  .headline-lg {
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  .headline-md {
    font-family: var(--font-display);
    font-size: clamp(22px, 3vw, 32px);
    font-weight: 700;
    line-height: 1.2;
  }

  .mono { font-family: var(--font-mono); }
  .mono-sm { font-family: var(--font-mono); font-size: 13px; }
  .mono-xs { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.5px; }
  .text-grey { color: var(--grey); }
  .text-light { font-weight: 300; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 14px;
    background: var(--black);
    color: var(--white);
    padding: 14px 28px;
    border: var(--border-thin);
    cursor: pointer;
    text-transform: lowercase;
    letter-spacing: 0.5px;
  }
  .btn:hover { background: var(--grey-dark); }
  .btn-ghost { background: var(--white); color: var(--black); }
  .btn-ghost:hover { background: var(--off-white); }

  /* ── CODE BLOCKS ── */
  .codeblock {
    background: var(--black);
    padding: 20px 24px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--green);
    line-height: 1.7;
    position: relative;
    overflow-x: auto;
  }

  .codeblock-copy {
    position: absolute;
    top: 12px;
    right: 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--grey);
    background: none;
    border: 1px solid var(--grey-dark);
    padding: 4px 10px;
    cursor: pointer;
  }
  .codeblock-copy:hover { color: var(--white); border-color: var(--grey); }

  /* ── CHECKBOXES ── */
  .step {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 12px 0;
  }

  .step-check {
    width: 22px;
    height: 22px;
    border: var(--border-thin);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    background: var(--white);
  }
  .step-check.checked { background: var(--black); }

  .step-text {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--grey-dark);
    line-height: 1.6;
  }
  .step-text code {
    background: var(--off-white);
    padding: 2px 6px;
    font-size: 12px;
    border: 1px solid var(--grey-light);
  }

  /* ── PROOF BOX ── */
  .proof {
    border-top: var(--border-thick);
    padding: 20px 0 0;
    margin-top: 24px;
  }
  .proof-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 8px;
  }
  .proof-text {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--grey-dark);
    line-height: 1.6;
  }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 40px;
    border-top: var(--border-thin);
    background: var(--white);
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
  }
  .progress-segments { display: flex; gap: 4px; flex: 1; }
  .progress-seg { flex: 1; height: 6px; background: var(--grey-light); }
  .progress-seg.filled { background: var(--black); }
  .progress-seg.current { background: var(--grey); }
  .progress-nav { display: flex; gap: 8px; }

  /* ── COLLAPSIBLE ── */
  .collapsible-trigger {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--grey);
    cursor: pointer;
    padding: 8px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .collapsible-trigger::before { content: '▸'; font-size: 10px; }
  .collapsible-trigger.open::before { content: '▾'; }
  .collapsible-content {
    display: none;
    padding: 12px 0;
    font-size: 15px;
    color: var(--grey-dark);
    line-height: 1.7;
  }
  .collapsible-trigger.open + .collapsible-content { display: block; }

  /* ── RESUME BANNER ── */
  .resume-banner {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--black);
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 12px 24px;
    z-index: 20;
    gap: 16px;
    align-items: center;
  }
  .resume-banner.visible { display: flex; }
  .resume-banner button {
    font-family: var(--font-mono);
    font-size: 12px;
    background: none;
    border: 1px solid var(--grey);
    color: var(--white);
    padding: 4px 12px;
    cursor: pointer;
  }
  .resume-banner button:hover { border-color: var(--white); }
  .resume-banner .dismiss {
    background: none;
    border: none;
    color: var(--grey);
    cursor: pointer;
    font-size: 16px;
  }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    .headline-xl { letter-spacing: -1px; }
    .progress-bar { padding: 16px 20px; }
  }
</style>
</head>
<body>

<!-- ══════ HOOK ══════ -->
<section class="screen" id="hook"></section>

<!-- ══════ DIAGNOSIS ══════ -->
<section class="screen" id="diagnose"></section>

<!-- ══════ BLOCKS ══════ -->
<section class="screen" id="block-1"></section>
<section class="screen" id="block-2"></section>
<section class="screen" id="block-3"></section>
<section class="screen" id="block-4"></section>
<section class="screen" id="block-5"></section>
<section class="screen" id="block-6"></section>
<section class="screen" id="block-7"></section>

<!-- ══════ COMPLETE ══════ -->
<section class="screen" id="complete"></section>

<!-- ══════ RESUME BANNER ══════ -->
<div class="resume-banner" id="resumeBanner">
  <span id="resumeText"></span>
  <button id="resumeBtn">resume →</button>
  <span class="dismiss" id="resumeDismiss">✕</span>
</div>

<script>
// ── STATE MANAGER ──
const State = {
  KEY: 'ai-sprint',

  load() {
    try {
      return JSON.parse(localStorage.getItem(this.KEY)) || this.default();
    } catch { return this.default(); }
  },

  save(state) {
    localStorage.setItem(this.KEY, JSON.stringify(state));
  },

  clear() {
    localStorage.removeItem(this.KEY);
  },

  default() {
    return {
      diagnosis: null,
      blocks: {},
      startedAt: null,
      completedAt: null,
      currentBlock: null
    };
  },

  hasDiagnosis() {
    const s = this.load();
    return s.diagnosis !== null;
  },

  hasProgress() {
    const s = this.load();
    return s.currentBlock !== null;
  },

  getDiagnosisScore() {
    const s = this.load();
    return s.diagnosis ? s.diagnosis.score : 0;
  },

  saveDiagnosis(answers) {
    const s = this.load();
    const score = answers.reduce((a, b) => a + b, 0);
    let tier = 'surface-user';
    if (score >= 3) tier = 'getting-there';
    if (score >= 6) tier = 'infrastructure-builder';
    s.diagnosis = { q1: answers[0], q2: answers[1], q3: answers[2], score, tier };
    this.save(s);
    return s.diagnosis;
  },

  toggleStep(blockNum, stepIndex) {
    const s = this.load();
    if (!s.blocks[blockNum]) {
      s.blocks[blockNum] = { steps: [], completed: false };
    }
    const steps = s.blocks[blockNum].steps;
    steps[stepIndex] = !steps[stepIndex];
    s.blocks[blockNum].completed = steps.every(Boolean);
    if (!s.startedAt) s.startedAt = Date.now();
    s.currentBlock = blockNum;
    this.save(s);
    return steps[stepIndex];
  },

  isStepChecked(blockNum, stepIndex) {
    const s = this.load();
    return s.blocks[blockNum]?.steps[stepIndex] || false;
  },

  isBlockCompleted(blockNum) {
    const s = this.load();
    return s.blocks[blockNum]?.completed || false;
  },

  getCompletedActions() {
    const s = this.load();
    let total = 0;
    for (const b of Object.values(s.blocks)) {
      total += b.steps.filter(Boolean).length;
    }
    return total;
  },

  getTotalActions() {
    return 24;
  },

  getElapsedMinutes() {
    const s = this.load();
    if (!s.startedAt) return 0;
    const end = s.completedAt || Date.now();
    return Math.round((end - s.startedAt) / 60000);
  },

  markComplete() {
    const s = this.load();
    s.completedAt = Date.now();
    this.save(s);
  },

  getCurrentBlock() {
    const s = this.load();
    return s.currentBlock;
  }
};

// ── ROUTER ──
const Router = {
  screens: ['hook', 'diagnose', 'block-1', 'block-2', 'block-3', 'block-4', 'block-5', 'block-6', 'block-7', 'complete'],

  init() {
    window.addEventListener('hashchange', () => this.route());
    this.route();
  },

  route() {
    const hash = location.hash.slice(1) || 'hook';
    const target = this.screens.includes(hash) ? hash : 'hook';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(target);
    if (el) el.classList.add('active');
    window.scrollTo(0, 0);

    // Show resume banner on hook if user has progress
    if (target === 'hook' && State.hasProgress()) {
      const block = State.getCurrentBlock();
      document.getElementById('resumeText').textContent = 'you left off at block ' + block + '.';
      document.getElementById('resumeBanner').classList.add('visible');
    } else {
      document.getElementById('resumeBanner').classList.remove('visible');
    }

    // Update progress bar visibility
    const progressBar = document.getElementById('progressBar');
    if (progressBar) {
      const isBlock = target.startsWith('block-');
      progressBar.style.display = isBlock ? 'flex' : 'none';
      if (isBlock) this.updateProgress(parseInt(target.split('-')[1]));
    }
  },

  navigate(hash) {
    location.hash = hash;
  },

  updateProgress(currentBlock) {
    const segments = document.querySelectorAll('.progress-seg');
    segments.forEach((seg, i) => {
      const blockNum = i + 1;
      seg.classList.remove('filled', 'current');
      if (State.isBlockCompleted(blockNum)) {
        seg.classList.add('filled');
      } else if (blockNum === currentBlock) {
        seg.classList.add('current');
      }
    });
  }
};

// ── RESUME BANNER ──
document.getElementById('resumeBtn').addEventListener('click', () => {
  const block = State.getCurrentBlock();
  Router.navigate('block-' + block);
});

document.getElementById('resumeDismiss').addEventListener('click', () => {
  document.getElementById('resumeBanner').classList.remove('visible');
});

// ── KEYBOARD NAV ──
document.addEventListener('keydown', (e) => {
  const hash = location.hash.slice(1) || 'hook';
  const idx = Router.screens.indexOf(hash);
  if (idx === -1) return;

  if (e.key === 'ArrowRight' && idx < Router.screens.length - 1) {
    Router.navigate(Router.screens[idx + 1]);
  }
  if (e.key === 'ArrowLeft' && idx > 0) {
    Router.navigate(Router.screens[idx - 1]);
  }
});

// ── COPY TO CLIPBOARD ──
function copyToClipboard(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'copied';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

// ── COLLAPSIBLE ──
function toggleCollapsible(el) {
  el.classList.toggle('open');
}

// ── INIT ──
Router.init();
</script>

</body>
</html>
